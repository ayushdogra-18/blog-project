            <!DOCTYPE html>
            <html xmlns:th="http://www.thymeleaf.org"
                  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
            <head>
                <meta charset="UTF-8">
                <title>Blog Application</title>
                <style>
                    *, *::before, *::after {
                        box-sizing: border-box;
                        margin: 0;
                        padding: 0;
                    }

                    body, html {
                        height: 100%;
                        font-family: Arial, sans-serif;
                        background-color: #f7f7f7;
                        color: #111111;
                    }

                    .main-wrapper {
                        display: flex;
                        flex-direction: column;
                        min-height: 100vh;
                        max-width: 1400px;
                        margin: 0 auto;
                        padding: 0 28px;
                    }

                    .top-bar {
                        display: flex;
                        justify-content: space-between;
                        align-items: center;
                        padding: 16px 0 0;
                    }

                    .top-bar-left form input[type="submit"] {
                        padding: 7px 18px;
                        font-size: 0.88em;
                        font-family: Arial, sans-serif;
                        border: 1px solid #bbb;
                        border-radius: 6px;
                        background-color: #111111;
                        color: #ffffff;
                        cursor: pointer;
                        transition: background-color 0.2s;
                    }

                    .top-bar-left form input[type="submit"]:hover {
                        background-color: #333;
                    }

                    .top-bar-right {
                        display: flex;
                        align-items: center;
                        gap: 10px;
                    }

                    .top-bar-right a {
                        padding: 6px 16px;
                        border-radius: 6px;
                        text-decoration: none;
                        font-size: 0.88em;
                        transition: background-color 0.2s;
                    }

                    .btn-login {
                        border: 1px solid #ccc;
                        color: #111;
                        background: white;
                    }

                    .btn-login:hover {
                        background: #f0f0f0;
                    }

                    .btn-register {
                        background: #111;
                        color: white;
                        border: 1px solid #111;
                    }

                    .btn-register:hover {
                        background: #333;
                    }

                    .welcome-text {
                        font-size: 0.88em;
                        color: #666;
                    }

                    .btn-logout {
                        padding: 6px 16px;
                        border: 1px solid #ccc;
                        border-radius: 6px;
                        background: white;
                        cursor: pointer;
                        font-size: 0.88em;
                        font-family: Arial, sans-serif;
                        transition: background-color 0.2s;
                    }

                    .btn-logout:hover {
                        background: #f0f0f0;
                    }

                    h1 {
                        color: #111111;
                        font-size: 2.2rem;
                        font-weight: bold;
                        margin: 28px 0 20px;
                        padding-bottom: 12px;
                        border-bottom: 1px solid #e0e0e0;
                    }

                    .sort-form {
                        margin: 12px 0 4px;
                    }

                    .sort-form form {
                        display: flex;
                        flex-wrap: wrap;
                        gap: 8px;
                        align-items: center;
                    }

                    input[type="text"] {
                        padding: 7px 10px;
                        font-size: 0.88em;
                        font-family: Arial, sans-serif;
                        border: 1px solid #ccc;
                        border-radius: 6px;
                        background-color: #ffffff;
                        color: #111;
                        width: 200px;
                        outline: none;
                        transition: border-color 0.2s;
                    }

                    input[type="text"]:focus { border-color: #888; }
                    input[type="text"]::placeholder { color: #aaa; }

                    select {
                        padding: 7px 10px;
                        font-size: 0.88em;
                        font-family: Arial, sans-serif;
                        border: 1px solid #ccc;
                        border-radius: 6px;
                        background-color: #ffffff;
                        color: #111;
                        cursor: pointer;
                        outline: none;
                        transition: border-color 0.2s;
                    }

                    select:focus { border-color: #888; }

                    .sort-form button[type="submit"] {
                        padding: 7px 18px;
                        background: #111111;
                        color: #ffffff;
                        border: 1px solid #111;
                        border-radius: 6px;
                        cursor: pointer;
                        font-size: 0.88em;
                        font-family: Arial, sans-serif;
                        transition: background-color 0.2s;
                    }

                    .sort-form button[type="submit"]:hover { background-color: #333; }

                    .sort-form a {
                        margin-left: 2px;
                        color: #999;
                        font-size: 0.85em;
                        text-decoration: none;
                        transition: color 0.2s;
                    }

                    .sort-form a:hover { color: #444; }

                    .blog-container {
                        display: grid;
                        grid-template-columns: repeat(3, 1fr);
                        gap: 20px;
                        padding: 24px 0;
                        flex-grow: 1;
                    }

                    #blog {
                        width: 100%;
                        border: 1px solid #e0e0e0;
                        border-radius: 10px;
                        padding: 20px;
                        background-color: #ffffff;
                        overflow-y: hidden;
                        height: 450px;
                        transition: box-shadow 0.2s, border-color 0.2s;
                    }

                    #blog:hover {
                        box-shadow: 0 4px 16px rgba(0,0,0,0.08);
                        border-color: #ccc;
                    }

                    #blog h2 {
                        font-size: 1.1em;
                        font-weight: bold;
                        margin-bottom: 10px;
                        color: #111111;
                        line-height: 1.35;
                        border-bottom: 1px solid #f0f0f0;
                        padding-bottom: 8px;
                    }

                    #blog h3 {
                        font-size: 0.88em;
                        font-weight: normal;
                        color: #666;
                        margin-bottom: 6px;
                    }

                    #blog h4 {
                        font-size: 0.8em;
                        font-weight: normal;
                        color: #999;
                        margin-bottom: 10px;
                    }

                    #blog p {
                        font-size: 0.9em;
                        color: #555;
                        line-height: 1.6;
                        overflow: hidden;
                        text-overflow: ellipsis;
                    }

                    #blog a {
                        text-decoration: none;
                        color: #111;
                        font-weight: bold;
                        font-size: 0.83em;
                        border-bottom: 1px solid #ccc;
                        transition: color 0.2s, border-color 0.2s;
                    }

                    #blog a:hover {
                        color: #555;
                        border-bottom-color: #999;
                    }

                    .tags { margin-top: 14px; }

                    .tag-box {
                        display: inline-block;
                        background-color: #f0f0f0;
                        color: #444;
                        padding: 3px 10px;
                        margin: 3px 3px 3px 0;
                        border-radius: 4px;
                        font-size: 0.75em;
                        text-transform: uppercase;
                        letter-spacing: 0.05em;
                    }

                    .pagination {
                        text-align: center;
                        padding: 24px 0 32px;
                        border-top: 1px solid #e8e8e8;
                        margin-top: 8px;
                        display: flex;
                        justify-content: center;
                        align-items: center;
                        gap: 16px;
                    }

                    .pagination a {
                        text-decoration: none;
                        padding: 7px 20px;
                        border: 1px solid #ccc;
                        border-radius: 6px;
                        color: #111;
                        font-size: 0.88em;
                        font-weight: bold;
                        background-color: #ffffff;
                        transition: background-color 0.2s, border-color 0.2s;
                        display: inline-block;
                    }

                    .pagination a:hover {
                        background-color: #f0f0f0;
                        border-color: #aaa;
                    }

                    .pagination span {
                        font-size: 0.88em;
                        font-weight: bold;
                        padding: 7px 14px;
                        background-color: #111;
                        color: #fff;
                        border-radius: 6px;
                    }
                    strong{
                    color:#000000;
                    }
                </style>
            </head>
            <body>
            <div class="main-wrapper">


                <div class="top-bar">
                    <div class="top-bar-left">
                        <div sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_AUTHOR')">
                            <form action="/createposts">
                                <input type="submit" value="+ Create Blog"/>
                            </form>
                        </div>
                    </div>
                    <div class="top-bar-right">
                        <!-- logged in nahi hai -->
                        <a sec:authorize="isAnonymous()" href="/login" class="btn-login">Login</a>
                        <a sec:authorize="isAnonymous()" href="/register" class="btn-register">Register</a>

                        <!-- logged in hai -->

                        <span sec:authorize="isAuthenticated()" class="welcome-text">
                            Welcome, <strong sec:authentication=" name" ></strong><br>
                                      <strong th:text="${loggedInEmail}"></strong>
                        </span>

                        <form sec:authorize="isAuthenticated()" action="/logout" method="post" style="margin:0;">

                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn-logout">Logout</button>
                        </form>
                    </div>
                </div>

                <h1>Blog Application</h1>

                  <div class="sort-form">
                    <form action="/blog" method="get">
                        <input type="hidden" name="limit" th:value="${limit}">
                        <input type="hidden" name="start" value="0">

                        <input type="text"
                               name="search"
                               th:value="${search}"
                               placeholder="Search title or content...">

                        <select name="author" onchange="this.form.submit()">
                            <option value="">All Authors</option>
                            <option th:each="a : ${allAuthors}"
                                    th:value="${a}"
                                    th:text="${a}"
                                    th:selected="${a == author}">
                            </option>
                        </select>

                        <select name="tagId" onchange="this.form.submit()">
                            <option value="">All Tags</option>
                            <option th:each="tag : ${allTags}"
                                    th:value="${tag.id}"
                                    th:text="${tag.name}"
                                    th:selected="${tag.id == tagId}">
                            </option>
                        </select>

                        <select name="sortBy" onchange="this.form.submit()">
                            <option value="title"       th:selected="${sortBy == 'title'}">Title</option>
                            <option value="publishedAt" th:selected="${sortBy == 'publishedAt'}">Newest</option>
                            <option value="author"      th:selected="${sortBy == 'author'}">Author</option>
                        </select>

                        <button type="submit">Search</button>
                        <a th:href="@{/blog(limit=${limit})}">Clear</a>
                    </form>
                </div>

                <div class="blog-container">
                    <div th:each="post : ${posts}" id="blog">
                        <h2 th:text="${'Title: '+post.title}"></h2>
                        <br>
                        <h3 th:text="${'Author: ' + (post.user != null ? post.user.username : 'Unknown')}"></h3>
                        <br>
                        <h4 th:text="${'Posted at: '+#temporals.format(post.publishedAt, 'dd MMMM yyyy')}"></h4>
                        <br>
                        <p th:text="${post.excerpt}"></p>
                        <a th:href="@{/updateblog(id=${post.id})}">read more...</a>
                        <br><br><br>
                        <div class="tags">
                            <span th:each="tag : ${post.tags}" th:text="${tag.name}" class="tag-box"></span>
                        </div>
                    </div>
                </div>

                <div class="pagination">
                    <a th:if="${start > 0}"
                       th:href="@{/blog(start=${start - limit}, limit=${limit}, sortBy=${sortBy},
                                    search=${search}, author=${author}, tagId=${tagId})}">
                        ← Previous
                    </a>
                    <span th:text="${(start / limit) + 1}"></span>
                    <a th:if="${currentPage < totalPages - 1}"
                       th:href="@{/blog(start=${start + limit}, limit=${limit}, sortBy=${sortBy},
                                    search=${search}, author=${author}, tagId=${tagId})}">
                        Next →
                    </a>
                </div>

            </div>
            <script>
                const form = document.querySelector('.sort-form form');
                const searchInput = form.querySelector('input[name="search"]');
                const authorSelect = form.querySelector('select[name="author"]');
                const tagSelect = form.querySelector('select[name="tagId"]');
                const sortSelect = form.querySelector('select[name="sortBy"]');
                const searchBtn = form.querySelector('button[type="submit"]');

                searchBtn.addEventListener('click', function () {
                    if (searchInput.value.trim() !== '') {
                        authorSelect.value = '';
                        tagSelect.value = '';
                        sortSelect.value = 'title';
                    }
                });
            </script>
            </body>
            </html>
