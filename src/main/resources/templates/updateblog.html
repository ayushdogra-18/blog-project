<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        #blog {
    width: 500px;
    border: 2px solid #333;
    border-radius: 10px;
    padding: 15px;
    margin: 15px;
    box-shadow: 3px 3px 12px rgba(0,0,0,0.2);
    background-color: #f9f9f9;
    box-sizing: border-box;
    max-height: 500px;
    overflow-y: auto;
}

        #blog h2 {
            font-size: 1.5em;
            color: #222;
            margin-bottom: 10px;
        }

        #blog p {
            font-size: 1em;
            color: #555;
            line-height: 1.4;
        }

        #blog h3 {
            margin-top: 20px;
            margin-bottom: 10px;
            color: #333;
        }

        #blog form {
            margin-bottom: 10px;
        }

        #blog input[type="text"] {
            padding: 5px 8px;
            font-size: 1em;
            border-radius: 4px;
            border: 1px solid #ccc;
            width: calc(100% - 16px);
            margin-bottom: 5px;
        }

        #blog button, #blog input[type="submit"] {
            padding: 5px 12px;
            font-size: 1em;
            border-radius: 4px;
            border: none;
            background-color: #007BFF;
            color: white;
            cursor: pointer;
        }

        #blog div {
            margin-bottom: 15px;
        }
  .comment {
    padding: 10px;
    margin-bottom: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    background-color: #f2f2f2;
}


.comment-name {
    font-weight: bold;
    margin-bottom: 5px;
    color: #333;
}


.comment-text {
    margin: 0;
    color: #555;
    font-size: 14px;
    line-height: 1.4;
}
    </style>
</head>
<body>

<div th:object="${post}" id="blog">
    <div>
        <a th:href="@{/blog}">Back to Blog.....</a>
        <form action="/updatepost" method="post">
            <input type="hidden" name="postId" th:value="${post.id}">
            <input type="submit" value="Edit">
        </form>
        <form action="/deletepost" method="post">
            <input type="hidden" name="postId" th:value="${post.id}">
            <input type="submit" value="Delete">
        </form>
    </div>
    <span style="font-size:2rem" th:text=" 'Title: ' + ${post.title}"></span>
    <p th:text="${post.content}"></p>

    <h3 style="font-size:2rem">Comments.....</h3>


    <form action="/addcomment" method="post">
        <input type="hidden" name="postId" th:value="${post.id}"/>
        <input type="text"  name="name" placeholder="Your name"/>
        <input type="text"  name="email" placeholder="Your email"/>
        <input type="text" name="comment" placeholder="Write comment"/>
        <button type="submit">Add Comment</button>
    </form>
    <br> <br>



    <div class="comment" th:each="c : ${post.comments}">
        <form action="editcomments" method="post">
            <input type="hidden" th:value="${post.id}">
            <input type="submit" value="Edit">
            <input type="submit" value="Delete">
        </form>
        <p class="comment-name" th:text="${c.name}" style="font-size:1.7rem;color:#007BFF"></p>
        <p class="comment-text" th:text="${c.comment}"></p>
    </div>


    <br>
    <br>

</div>
</body>
</html>
