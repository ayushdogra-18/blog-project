<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Blog Post</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
            color: #111111;
            margin: 0;
            padding: 24px;
        }

        #blog {
            width: 650px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 28px;
            margin: 20px auto;
            background-color: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        .top-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 1px solid #f0f0f0;
        }

        .top-actions a {
            text-decoration: none;
            color: #555;
            font-size: 0.9em;
            transition: color 0.2s;
        }

        .top-actions a:hover {
            color: #111;
        }

        .btn-edit {
            padding: 5px 14px;
            background-color: #111111;
            color: white;
            border: 1px solid #111;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.88em;
            font-family: Arial, sans-serif;
            transition: background-color 0.2s;
        }

        .btn-edit:hover {
            background-color: #333;
        }

        .btn-delete {
            padding: 5px 14px;
            background-color: #ffffff;
            color: #111;
            border: 1px solid #ccc;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.88em;
            font-family: Arial, sans-serif;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .btn-delete:hover {
            background-color: #f5f5f5;
            border-color: #aaa;
        }

        .post-title {
            font-size: 1.7rem;
            color: #111111;
            margin-bottom: 14px;
            font-weight: bold;
        }

        .post-content {
            font-size: 1em;
            color: #555;
            line-height: 1.75;
            margin-bottom: 28px;
        }

        .comments-heading {
            font-size: 1.2rem;
            color: #111111;
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e8e8e8;
        }

        .comment-form {
            background-color: #f9f9f9;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .comment-form input[type="text"] {
            padding: 7px 10px;
            font-size: 0.9em;
            border: 1px solid #ccc;
            border-radius: 6px;
            width: 100%;
            margin-bottom: 8px;
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            color: #111;
            outline: none;
            transition: border-color 0.2s;
        }

        .comment-form input[type="text"]:focus {
            border-color: #888;
        }

        .comment-form input[type="text"]::placeholder {
            color: #bbb;
        }

        .btn-submit {
            padding: 7px 18px;
            background-color: #111111;
            color: white;
            border: 1px solid #111;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            font-family: Arial, sans-serif;
            transition: background-color 0.2s;
        }

        .btn-submit:hover {
            background-color: #333;
        }

        .comment {
            padding: 12px 15px;
            margin-bottom: 10px;
            border: 1px solid #eeeeee;
            border-radius: 8px;
            background-color: #fafafa;
        }

        .comment-name {
            font-weight: bold;
            color: #111111;
            font-size: 0.95em;
            margin-bottom: 4px;
        }

        .comment-text {
            color: #666;
            font-size: 0.9em;
            line-height: 1.5;
            margin: 0 0 10px 0;
        }

        .comment-actions {
            display: flex;
            gap: 8px;
        }

        .btn-comment-edit {
            padding: 3px 12px;
            background-color: #111111;
            color: white;
            border: 1px solid #111;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8em;
            font-family: Arial, sans-serif;
            transition: background-color 0.2s;
        }

        .btn-comment-edit:hover {
            background-color: #333;
        }

        .btn-comment-delete {
            padding: 3px 12px;
            background-color: #ffffff;
            color: #111;
            border: 1px solid #ccc;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8em;
            font-family: Arial, sans-serif;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .btn-comment-delete:hover {
            background-color: #f5f5f5;
            border-color: #aaa;
        }
    </style>
</head>
<body>

<div th:object="${post}" id="blog">

    <div class="top-actions">
        <a th:href="@{/blog}">← Back to Blog</a>

        <form action="/updatepost" method="post">
            <input type="hidden" name="postId" th:value="${post.id}">
            <input type="submit" value="Edit Post" class="btn-edit">
        </form>

        <form action="/deletepost" method="post"
              onsubmit="return confirm('Are you sure you want to delete this post?');">
            <input type="hidden" name="postId" th:value="${post.id}">
            <input type="submit" value="Delete Post" class="btn-delete">
        </form>
    </div>

    <div class="post-title" th:text="${post.title}"></div>
    <p class="post-content" th:text="${post.content}"></p>

    <h3 class="comments-heading">Comments</h3>

    <div class="comment-form">
        <form action="/addcomment" method="post">
            <input type="hidden" name="postId" th:value="${post.id}"/>
            <input type="hidden" name="commentId"
                   th:value="${editComment != null ? editComment.id : ''}"/>

            <input type="text" name="name"
                   th:value="${editComment != null ? editComment.name : ''}"
                   placeholder="Your name"/>

            <input type="text" name="email"
                   th:value="${editComment != null ? editComment.email : ''}"
                   placeholder="Your email"/>

            <input type="text" name="comment"
                   th:value="${editComment != null ? editComment.comment : ''}"
                   placeholder="Write your comment..."/>

            <button type="submit" class="btn-submit"
                    th:text="${editComment != null ? 'Update Comment' : 'Add Comment'}">
            </button>
        </form>
    </div>

    <div class="comment" th:each="c : ${post.comments}">
        <p class="comment-name" th:text="${c.name}"></p>
        <p class="comment-text" th:text="${c.comment}"></p>

        <div class="comment-actions">
            <form action="/editcomments" method="post">
                <input type="hidden" name="commentId" th:value="${c.id}">
                <input type="submit" value="Edit" class="btn-comment-edit">
            </form>

            <form action="/deletecomment" method="post">
                <input type="hidden" name="commentId" th:value="${c.id}">
                <input type="hidden" name="postId" th:value="${post.id}">
                <input type="submit" value="Delete" class="btn-comment-delete">
            </form>
        </div>
    </div>

</div>
</body>
</html>
