<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Blog</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
            color: #111111;
            padding: 32px 28px;
        }

        h2 {
            color: #111111;
            font-size: 1.7rem;
            font-weight: bold;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e0e0e0;
        }

        form {
            background-color: #ffffff;
            padding: 28px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            max-width: 600px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 6px;
            font-size: 0.88em;
            color: #444;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            margin-bottom: 15px;
            font-family: Arial, sans-serif;
            font-size: 0.93em;
            color: #111;
            background-color: #fff;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        textarea:focus {
            border-color: #888;
        }

        input[type="text"]::placeholder,
        textarea::placeholder {
            color: #bbb;
        }

        input[type="text"]:disabled {
            background-color: #f5f5f5;
            color: #aaa;
            border-color: #ddd;
            cursor: not-allowed;
        }

        textarea {
            resize: vertical;
        }

        input[type="submit"] {
            padding: 8px 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
            background-color: #111111;
            color: #ffffff;
            font-size: 0.88em;
            font-family: Arial, sans-serif;
            cursor: pointer;
            margin-right: 10px;
            text-transform: capitalize;
            transition: background-color 0.2s;
        }

        input[type="submit"]:hover {
            background-color: #333;
        }

        input[type="submit"]:disabled {
            background-color: #ccc;
            border-color: #ccc;
            color: #888;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<h2>Create Blog Post</h2>

<form th:action="@{${blog.id} == null ?  @{/blogs} : @{/updatepublishblog}}" th:object="${blog}" method="post">

    <input type="hidden" th:field="*{id}" />
    <label>Title</label><br>
    <input type="text" th:field="*{title}" placeholder="Enter blog title" required/>
    <br><br>

    <label>Author</label><br>
    <input type="text" th:field="*{author}" placeholder="Enter author name" th:disabled="${blog.id} ? 'true' : 'false'" required/>
    <br><br>

    <label>Content</label><br>
    <textarea th:field="*{content}" rows="6" cols="40" placeholder="Write your blog here" required></textarea>
    <br><br>

    <label>Tags</label><br>
    <input type="text" name="tagNames" placeholder="e.g. spring, java" th:value="${tags}" required/>
    <br><br>

    <input type="submit" name="action" value="publish" th:if="${blog.id == null}" />
    <input type="submit" name="action" value="draft" th:if="${blog.id == null}" />
    <input type="submit" name="action" value="update" th:if="${blog.id != null}" />

</form>

</body>
</html>
