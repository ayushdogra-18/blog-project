<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <style>
        *, *::before, *::after {
        box-sizing: border-box; margin: 0; padding: 0;
         }
        body {
         background: #f7f7f7;
         display: flex;
         justify-content: center;
         padding-top: 80px;
         }
        .box {
         background: white;
         padding: 32px;
         border-radius: 10px;
         border: 1px solid #e0e0e0;
         box-shadow: 0 2px 8px rgba(0,0,0,0.05);
         width: 340px;
         }
        h2 {
        font-size: 1.4rem;
        color: #111;
        margin-bottom: 24px;
         }
        label {
        font-size: 0.85em;
        font-weight: bold;
        color: #444;
         display: block;
         margin-bottom: 5px;
         }
        input[type="text"], input[type="email"],input[type="password"], select {
         width: 100%;
         padding: 8px 10px;
         margin-bottom: 14px;
         border: 1px solid #ccc;
         border-radius: 6px;
         font-size: 0.93em;
         }
        button {
        width: 100%;
        padding: 9px;
        background: #111111;
        color: white;
        border: none; border-radius: 6px;
        cursor: pointer;
        font-size: 0.93em;
         }
        button:hover {
        background: #333;
        }
        .error {
        color: #cc0000;
        font-size: 0.85em;
        margin-bottom: 14px;
        padding: 8px;
        background: #fff0f0;
        border-radius: 6px; }
        .link {
        margin-top: 16px;
        font-size: 0.85em;
        color: #666;
        }
        .link a {
        color: #111;
        font-weight: bold;
        }
    </style>
</head>
<body>
<div class="box">
    <h2>Register</h2>

    <div th:if="${error}" class="error" th:text="${error}"></div>

    <form action="/register" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <label>Username</label>
        <input type="text" name="username" placeholder="Choose username" required>

        <label>Email</label>
        <input type="email" name="email" placeholder="Enter email" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Choose password" required>

        <label>Role</label>
        <select name="role">
            <option value="ROLE_AUTHOR">Author</option>
        </select>

        <button type="submit">Register</button>
    </form>

    <p class="link">Already have account? <a href="/login">Login here</a></p>
</div>
</body>
</html>
