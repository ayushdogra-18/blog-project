<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
            color: #111111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        div {
            display: flex;
            gap: 16px;
        }

        input[type="submit"] {
            padding: 10px 24px;
            font-size: 0.95em;
            border: 1px solid #ccc;
            border-radius: 6px;
            background-color: #111111;
            color: #ffffff;
            cursor: pointer;
            font-family: Arial, sans-serif;
            transition: background-color 0.2s;
        }

        input[type="submit"]:hover {
            background-color: #333;
        }
    </style>
</head>
<body>
<div>
    <div sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_AUTHOR')">
        <form action="/createposts">
            <input type="submit" value="+ Create Blog"/>
        </form>
    </div>

    <form action="/blog">
        <input type="submit" value="All Blogs">
    </form>
</div>
</body>
</html>
