<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        div {
            display: flex;
            gap: 20px;
        }

        input[type="submit"] {
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 5px;
            border: 2px solid #007BFF;
            background-color: #007BFF;
            color: #fff;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div>
    <form action="/createposts">
        <input type="submit" value="Create your Own Blog">
    </form>

    <form action="/blog">
        <input type="submit" value="All Blogs">
    </form>
</div>
</body>
</html>
