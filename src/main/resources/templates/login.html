<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f7f7f7;
               display: flex; justify-content: center; padding-top: 80px; }
        .box { background: white; padding: 32px; border-radius: 10px;
               border: 1px solid #e0e0e0; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
               width: 340px; }
        h2 { font-size: 1.4rem; color: #111; margin-bottom: 24px; }
        label { font-size: 0.85em; font-weight: bold; color: #444;
                display: block; margin-bottom: 5px; }
        input[type="text"], input[type="password"] {
               width: 100%; padding: 8px 10px; margin-bottom: 14px;
               border: 1px solid #ccc; border-radius: 6px; font-size: 0.93em; }
        button { width: 100%; padding: 9px; background: #111111; color: white;
                 border: none; border-radius: 6px; cursor: pointer;
                 font-size: 0.93em; }
        button:hover { background: #333; }
        .error { color: #cc0000; font-size: 0.85em; margin-bottom: 14px;
                 padding: 8px; background: #fff0f0; border-radius: 6px; }
        .link { margin-top: 16px; font-size: 0.85em; color: #666; }
        .link a { color: #111; font-weight: bold; }
    </style>
</head>
<body>
<div class="box">
    <h2>Login</h2>

    <div th:if="${param.error}" class="error">
        Invalid username or password!
    </div>

    <form action="/login" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" required>
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required>
        <button type="submit">Login</button>
    </form>

    <p class="link">No account? <a href="/register">Register here</a></p>
</div>
</body>
</html>
